name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Data integrity audit (deploy gate)
        run: node scripts/audit-data.mjs

      - name: Content uniqueness audit (thin-page gate)
        run: |
          node scripts/content-uniqueness.mjs --json > /tmp/uniqueness.json
          node -e "const r=require('/tmp/uniqueness.json');console.log('lt120:'+r.thresholds.lt120+' lt180:'+r.thresholds.lt180+' lt280:'+r.thresholds.lt280+' models_present:'+r.modelsAffected.present);if(r.thresholds.lt120>70){console.error('FAIL: thin-page regression');process.exit(1);}console.log('PASS');"

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=appliance-errors --commit-dirty=true
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CF_GLOBAL_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
